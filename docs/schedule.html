<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; padding-bottom: 80px; }
.admin-nav { display: flex; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #334155; flex-wrap: wrap; }
.admin-nav a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; padding: 5px 12px; border-radius: 6px; }
.admin-nav a:hover { color: #f1f5f9; background: #1e293b; }
.admin-nav a.active { color: #60a5fa; background: #1e3a5f; }
h1 { font-size: 1.4rem; margin-bottom: 4px; }
.subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
.stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.stat { background: #1e293b; padding: 8px 14px; border-radius: 10px; font-size: 0.82rem; }
.stat b { color: #60a5fa; }
.stat b.green { color: #4ade80; }
.stat b.amber { color: #fbbf24; }
.stat b.red { color: #f87171; }
.stat b.purple { color: #a78bfa; }
.stat b.teal { color: #2dd4bf; }

.search-bar { margin-bottom: 20px; }
.search-bar input { width: 100%; max-width: 400px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; padding: 8px 14px; font-size: 0.85rem; }
.search-bar input:focus { border-color: #60a5fa; outline: none; }
.search-bar input::placeholder { color: #64748b; }

.day-card { background: #1e293b; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.day-header { padding: 14px 16px; background: #243044; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.day-header:hover { background: #2d3a50; }
.day-title { font-weight: 700; font-size: 0.95rem; }
.day-meta { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
.day-badge { font-size: 0.7rem; background: #334155; color: #94a3b8; padding: 2px 10px; border-radius: 12px; white-space: nowrap; }
.day-chevron { color: #64748b; transition: transform 0.2s; font-size: 0.75rem; }
.day-chevron.open { transform: rotate(90deg); }

.event-list { padding: 4px 0; }
.event-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid #1a2332; transition: background 0.1s; }
.event-row:first-child { border-top: none; }
.event-row:hover { background: #253245; }
.event-row.hidden-item { opacity: 0.4; text-decoration: line-through; }

.badge { font-size: 0.65rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; flex-shrink: 0; }
.badge-activity { background: #1e3a5f; color: #60a5fa; }
.badge-hike { background: #064e3b; color: #34d399; }
.badge-waterfall { background: #164e63; color: #22d3ee; }
.badge-custom { background: #2e1065; color: #a78bfa; }
.badge-stay { background: #78350f; color: #fbbf24; }
.badge-added { background: #0d3b2e; color: #2dd4bf; }

.event-name { flex: 1; font-size: 0.85rem; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-duration { font-size: 0.75rem; color: #64748b; white-space: nowrap; flex-shrink: 0; }
.event-creator { font-size: 0.65rem; color: #94a3b8; background: #334155; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }

.event-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-icon { background: none; border: 1px solid transparent; color: #64748b; cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 0.75rem; transition: all 0.15s; }
.btn-icon:hover { color: #f1f5f9; background: #334155; }
.btn-icon.delete:hover { color: #f87171; background: #3f1515; }
.btn-icon.restore:hover { color: #4ade80; background: #0a3520; }

.edit-form { padding: 12px 16px; background: #0f172a; border-top: 1px solid #1a2332; }
.edit-form-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.edit-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.edit-form-field { display: flex; flex-direction: column; gap: 4px; }
.edit-form-field.full-width { grid-column: 1 / -1; }
.edit-form-field label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
.edit-form-field input[type="text"],
.edit-form-field input[type="number"] { background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #f1f5f9; padding: 6px 10px; font-size: 0.85rem; }
.edit-form-field input[type="text"]:focus,
.edit-form-field input[type="number"]:focus { border-color: #60a5fa; outline: none; }
.edit-form-field input[type="text"]::placeholder,
.edit-form-field input[type="number"]::placeholder { color: #475569; }
.edit-form-checks { display: flex; gap: 16px; padding-top: 4px; }
.edit-form-checks label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #cbd5e1; cursor: pointer; text-transform: none; letter-spacing: normal; }
.edit-form-checks input[type="checkbox"] { accent-color: #60a5fa; width: 16px; height: 16px; cursor: pointer; }
.edit-form-actions { display: flex; gap: 6px; justify-content: flex-end; }

.btn-save { padding: 5px 12px; border-radius: 6px; border: none; background: #166534; color: #4ade80; font-weight: 600; font-size: 0.78rem; cursor: pointer; }
.btn-save:hover { background: #15803d; }
.btn-cancel { padding: 5px 12px; border-radius: 6px; border: none; background: #334155; color: #94a3b8; font-weight: 600; font-size: 0.78rem; cursor: pointer; }
.btn-cancel:hover { background: #475569; }

.btn-add { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; background: none; border: none; border-top: 1px dashed #334155; color: #64748b; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
.btn-add:hover { color: #60a5fa; background: #0f1b2d; }

.rename-indicator { font-size: 0.6rem; color: #fbbf24; margin-left: 4px; vertical-align: super; }
.override-indicator { font-size: 0.6rem; color: #60a5fa; margin-left: 4px; vertical-align: super; }

.hidden-section { margin-top: 24px; }
.hidden-section h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 10px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; display: none; z-index: 100; }
.toast.success { background: #166534; color: #fff; }
.toast.error { background: #991b1b; color: #fff; }

.loading { text-align: center; padding: 60px; color: #94a3b8; }
.empty { text-align: center; padding: 40px; color: #64748b; font-style: italic; }

@media (max-width: 640px) {
  body { padding: 12px; padding-bottom: 80px; }
  .event-row { flex-wrap: wrap; gap: 6px; padding: 10px 12px; }
  .event-name { flex-basis: calc(100% - 80px); order: 1; }
  .badge { order: 0; }
  .event-duration { order: 2; }
  .event-creator { order: 3; }
  .event-actions { order: 4; margin-left: auto; }
  .edit-form-grid { grid-template-columns: 1fr; }
  .edit-form-field.full-width { grid-column: 1; }
}
</style>
</head>
<body>

<nav class="admin-nav">
  <a href="index.html">Dashboard</a>
  <a href="admin.html">Photos</a>
  <a href="schedule.html" class="active">Schedule</a>
  <a href="hikes.html">Hikes</a>
</nav>

<h1>Schedule Admin</h1>
<p class="subtitle">Edit, add, or remove events. Custom events from the app appear automatically after sync.</p>

<div class="stats" id="stats"></div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search events..." oninput="render()">
</div>

<div id="content"><div class="loading">Loading schedule...</div></div>

<div id="hiddenSection"></div>

<div class="toast" id="toast"></div>

<script>
var REPO = 'freecodecollective/iceland-bound';
var TOKEN = atob(['Z2hwX3N1SERVT','TFLRkFCQk5Dcm9D','U1RtVjJEU3Z6U3V','NUDJKRlBzcQ=='].join(''));
var API = 'https://api.github.com/repos/' + REPO;

var tripData = null;
var adminData = { renames: {}, hidden: [], overrides: {}, additions: [] };
var adminSha = null;
var adminDeletedEvents = [];
var adminDeletedSha = null;
var editingKey = null;
var addingToDay = null;
var openDays = {};
var saving = false;

function headers() {
  return { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' };
}

function decodeB64(b64) {
  var bin = atob(b64.replace(/\n/g, ''));
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function generateId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return 'admin-' + crypto.randomUUID();
  return 'admin-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function load() {
  try {
    var results = await Promise.all([
      fetch(API + '/contents/data/trip-data.json?ref=main&_t=' + Date.now(), { headers: headers(), cache: 'no-store' }),
      fetch(API + '/contents/data/schedule-admin.json?ref=main&_t=' + Date.now(), { headers: headers(), cache: 'no-store' }),
      fetch(API + '/contents/data/admin-deleted-events.json?ref=main&_t=' + Date.now(), { headers: headers(), cache: 'no-store' })
    ]);

    var tripRes = results[0];
    var adminRes = results[1];
    var delEvRes = results[2];

    var tripJson = await tripRes.json();
    tripData = JSON.parse(decodeB64(tripJson.content));

    if (adminRes.ok) {
      var adminJson = await adminRes.json();
      adminSha = adminJson.sha;
      adminData = JSON.parse(decodeB64(adminJson.content));
      if (!adminData.renames) adminData.renames = {};
      if (!adminData.hidden) adminData.hidden = [];
      if (!adminData.overrides) adminData.overrides = {};
      if (!Array.isArray(adminData.additions)) adminData.additions = [];
    }

    if (delEvRes.ok) {
      var delEvJson = await delEvRes.json();
      adminDeletedSha = delEvJson.sha;
      adminDeletedEvents = JSON.parse(decodeB64(delEvJson.content));
    }

    openDays = {};
    tripData.itinerary.forEach(function(d) { openDays[d.id] = true; });

    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty">Failed to load: ' + e.message + '</div>';
  }
}

function getAllEvents() {
  if (!tripData) return [];
  var events = [];

  tripData.itinerary.forEach(function(day) {
    if (day.stayName) {
      events.push({
        key: 'd' + day.id + '-stay',
        name: day.stayName,
        type: 'stay',
        dayId: day.id,
        dayDate: day.date,
        dayTitle: day.title,
        duration: 'Accommodation',
        isCustom: false,
        isAdminAdded: false,
        isHike: false,
        isWaterfall: false,
        hikeKm: null
      });
    }

    day.activities.forEach(function(a, i) {
      var aType = 'activity';
      if (a.isHike && a.isWaterfall) aType = 'hike';
      else if (a.isHike) aType = 'hike';
      else if (a.isWaterfall) aType = 'waterfall';

      events.push({
        key: 'd' + day.id + '-a' + i,
        name: a.name,
        type: aType,
        dayId: day.id,
        dayDate: day.date,
        dayTitle: day.title,
        duration: a.duration,
        isCustom: false,
        isAdminAdded: false,
        isHike: !!a.isHike,
        isWaterfall: !!a.isWaterfall,
        hikeKm: a.hikeDistanceKm != null ? a.hikeDistanceKm : null
      });
    });
  });

  if (tripData.travelers) {
    tripData.travelers.forEach(function(t) {
      if (!t.customEvents) return;
      t.customEvents.forEach(function(e) {
        var evId = e.id || ('custom-' + e.name);
        if (adminDeletedEvents.indexOf(evId) !== -1) return;

        var cat = (e.activityCategory || '').toLowerCase();
        var eType = 'custom';
        if (cat === 'hiking') eType = 'hike';
        else if (cat === 'waterfall') eType = 'waterfall';

        var dayInfo = tripData.itinerary.find(function(d) { return d.id === e.dayID; });

        events.push({
          key: evId,
          name: e.name,
          type: eType,
          dayId: e.dayID,
          dayDate: dayInfo ? dayInfo.date : '',
          dayTitle: dayInfo ? dayInfo.title : 'Day ' + e.dayID,
          duration: '',
          createdBy: e.createdBy || t.name,
          notes: e.notes,
          isCustom: true,
          isAdminAdded: false,
          isHike: cat === 'hiking',
          isWaterfall: cat === 'waterfall',
          hikeKm: null
        });
      });
    });
  }

  if (adminData.additions) {
    adminData.additions.forEach(function(a) {
      var aType = 'activity';
      if (a.isHike && a.isWaterfall) aType = 'hike';
      else if (a.isHike) aType = 'hike';
      else if (a.isWaterfall) aType = 'waterfall';

      var dayInfo = tripData.itinerary.find(function(d) { return d.id === a.dayId; });

      events.push({
        key: a.id,
        name: a.name,
        type: aType,
        dayId: a.dayId,
        dayDate: dayInfo ? dayInfo.date : '',
        dayTitle: dayInfo ? dayInfo.title : 'Day ' + a.dayId,
        duration: a.duration || '',
        isCustom: false,
        isAdminAdded: true,
        isHike: !!a.isHike,
        isWaterfall: !!a.isWaterfall,
        hikeKm: a.hikeDistanceKm != null ? a.hikeDistanceKm : null
      });
    });
  }

  return events;
}

function getDisplayData(e) {
  if (e.isAdminAdded) {
    return {
      name: e.name,
      duration: e.duration || '',
      type: e.type,
      isHike: !!e.isHike,
      isWaterfall: !!e.isWaterfall,
      hikeKm: e.hikeKm,
      isOverridden: false,
      isRenamed: false
    };
  }

  var override = adminData.overrides ? adminData.overrides[e.key] : null;
  if (!override) {
    return {
      name: adminData.renames[e.key] || e.name,
      duration: e.duration || '',
      type: e.type,
      isHike: !!e.isHike,
      isWaterfall: !!e.isWaterfall,
      hikeKm: e.hikeKm,
      isOverridden: false,
      isRenamed: !!adminData.renames[e.key]
    };
  }

  var isHike = override.isHike !== undefined ? override.isHike : !!e.isHike;
  var isWaterfall = override.isWaterfall !== undefined ? override.isWaterfall : !!e.isWaterfall;
  var hikeKm = override.hikeDistanceKm !== undefined ? override.hikeDistanceKm : e.hikeKm;

  var baseType;
  if (e.type === 'stay') baseType = 'stay';
  else if (e.isCustom) baseType = 'custom';
  else baseType = 'activity';

  var type;
  if (isHike) type = 'hike';
  else if (isWaterfall) type = 'waterfall';
  else type = baseType;

  return {
    name: override.name !== undefined ? override.name : (adminData.renames[e.key] || e.name),
    duration: override.duration !== undefined ? override.duration : (e.duration || ''),
    type: type,
    isHike: isHike,
    isWaterfall: isWaterfall,
    hikeKm: hikeKm,
    isOverridden: true,
    isRenamed: false
  };
}

function typeLabel(type) {
  if (type === 'hike') return 'Hike';
  if (type === 'waterfall') return 'Waterfall';
  if (type === 'stay') return 'Stay';
  if (type === 'custom') return 'Custom';
  return 'Activity';
}

function render() {
  var events = getAllEvents();
  var query = (document.getElementById('search').value || '').toLowerCase();

  var visibleEvents = events.filter(function(e) {
    return adminData.hidden.indexOf(e.key) === -1;
  });
  var hiddenEvents = events.filter(function(e) {
    return adminData.hidden.indexOf(e.key) !== -1;
  });

  if (query) {
    visibleEvents = visibleEvents.filter(function(e) {
      var dd = getDisplayData(e);
      return dd.name.toLowerCase().indexOf(query) !== -1 ||
             e.dayTitle.toLowerCase().indexOf(query) !== -1 ||
             (dd.type && dd.type.toLowerCase().indexOf(query) !== -1);
    });
  }

  var totalActs = events.filter(function(e) { return e.type === 'activity'; }).length;
  var totalHikes = events.filter(function(e) { return e.type === 'hike'; }).length;
  var totalWaterfalls = events.filter(function(e) { return e.type === 'waterfall'; }).length;
  var totalCustom = events.filter(function(e) { return e.isCustom; }).length;
  var totalHidden = hiddenEvents.length;
  var totalRenamed = Object.keys(adminData.renames).filter(function(k) {
    return !adminData.overrides[k];
  }).length;
  var totalOverrides = Object.keys(adminData.overrides).length;
  var totalAdditions = adminData.additions.length;

  document.getElementById('stats').innerHTML =
    '<div class="stat"><b>' + totalActs + '</b> activities</div>' +
    '<div class="stat"><b class="green">' + totalHikes + '</b> hikes</div>' +
    '<div class="stat"><b class="amber">' + totalWaterfalls + '</b> waterfalls</div>' +
    '<div class="stat"><b class="purple">' + totalCustom + '</b> custom</div>' +
    (totalAdditions ? '<div class="stat"><b class="teal">' + totalAdditions + '</b> added</div>' : '') +
    (totalOverrides ? '<div class="stat"><b>' + totalOverrides + '</b> modified</div>' : '') +
    (totalRenamed ? '<div class="stat"><b class="amber">' + totalRenamed + '</b> renamed</div>' : '') +
    (totalHidden ? '<div class="stat"><b class="red">' + totalHidden + '</b> hidden</div>' : '');

  var byDay = {};
  var dayOrder = [];
  visibleEvents.forEach(function(e) {
    if (!byDay[e.dayId]) {
      byDay[e.dayId] = { id: e.dayId, date: e.dayDate, title: e.dayTitle, events: [] };
      dayOrder.push(e.dayId);
    }
    byDay[e.dayId].events.push(e);
  });

  // Ensure all itinerary days appear even if empty (so add button is reachable)
  if (!query && tripData && tripData.itinerary) {
    tripData.itinerary.forEach(function(day) {
      if (!byDay[day.id]) {
        byDay[day.id] = { id: day.id, date: day.date, title: day.title, events: [] };
        dayOrder.push(day.id);
      }
    });
  }

  dayOrder.sort(function(a, b) { return a - b; });

  if (dayOrder.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty">No events match your search.</div>';
  } else {
    var html = '';
    dayOrder.forEach(function(dayId) {
      var day = byDay[dayId];
      var isOpen = openDays[dayId] !== false;
      var count = day.events.length;

      html += '<div class="day-card">';
      html += '<div class="day-header" onclick="toggleDay(' + dayId + ')">';
      html += '<div>';
      html += '<div class="day-title">' + escHtml(day.date) + ' &mdash; ' + escHtml(day.title) + '</div>';
      html += '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;">';
      html += '<span class="day-badge">' + count + ' event' + (count !== 1 ? 's' : '') + '</span>';
      html += '<span class="day-chevron' + (isOpen ? ' open' : '') + '">&blacktriangleright;</span>';
      html += '</div>';
      html += '</div>';

      if (isOpen) {
        html += '<div class="event-list">';
        day.events.forEach(function(e) {
          if (editingKey === e.key) {
            html += renderEditForm(e);
          } else {
            html += renderEventRow(e);
          }
        });
        html += '</div>';

        // Add Activity button / form (only when not searching)
        if (!query) {
          if (addingToDay === dayId) {
            html += renderAddForm(dayId);
          } else {
            html += '<button class="btn-add" onclick="startAdd(' + dayId + ')">+ Add Activity</button>';
          }
        }
      }
      html += '</div>';
    });
    document.getElementById('content').innerHTML = html;
  }

  // Hidden events section
  if (hiddenEvents.length > 0 && !query) {
    var hHtml = '<div class="hidden-section">';
    hHtml += '<h2>Hidden Events (' + hiddenEvents.length + ')</h2>';
    hHtml += '<div class="day-card"><div class="event-list">';
    hiddenEvents.forEach(function(e) {
      var dd = getDisplayData(e);
      hHtml += '<div class="event-row hidden-item">';
      hHtml += '<span class="badge badge-' + dd.type + '">' + typeLabel(dd.type) + '</span>';
      hHtml += '<span class="event-name">' + escHtml(dd.name) + '</span>';
      hHtml += '<span class="event-duration">' + escHtml(e.dayDate) + '</span>';
      hHtml += '<div class="event-actions">';
      hHtml += '<button class="btn-icon restore" onclick="restoreEvent(\'' + escAttr(e.key) + '\')" title="Restore">&hookleftarrow;</button>';
      hHtml += '</div>';
      hHtml += '</div>';
    });
    hHtml += '</div></div></div>';
    document.getElementById('hiddenSection').innerHTML = hHtml;
  } else {
    document.getElementById('hiddenSection').innerHTML = '';
  }

  // Focus inputs after render
  if (editingKey) {
    var editInput = document.getElementById('edit-name');
    if (editInput) { editInput.focus(); editInput.select(); }
  }
  if (addingToDay !== null) {
    var addInput = document.getElementById('add-name');
    if (addInput) addInput.focus();
  }
}

function renderEventRow(e) {
  var dd = getDisplayData(e);
  var html = '<div class="event-row">';
  html += '<span class="badge badge-' + dd.type + '">' + typeLabel(dd.type) + '</span>';
  if (e.isAdminAdded) html += '<span class="badge badge-added">Added</span>';
  html += '<span class="event-name">' + escHtml(dd.name);
  if (dd.isOverridden) html += '<span class="override-indicator" title="Modified (originally: ' + escAttr(e.name) + ')">&#9998;</span>';
  else if (dd.isRenamed) html += '<span class="rename-indicator" title="Original: ' + escAttr(e.name) + '">&#9998;</span>';
  html += '</span>';
  if (dd.duration) html += '<span class="event-duration">' + escHtml(dd.duration) + '</span>';
  if (e.createdBy) html += '<span class="event-creator">' + escHtml(e.createdBy) + '</span>';
  html += '<div class="event-actions">';
  html += '<button class="btn-icon" onclick="startEdit(\'' + escAttr(e.key) + '\')" title="Edit">&#9999;&#65039;</button>';
  html += '<button class="btn-icon delete" onclick="hideEvent(\'' + escAttr(e.key) + '\')" title="Remove">&#10005;</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function renderEditForm(e) {
  var dd = getDisplayData(e);

  var html = '<div class="edit-form" onkeydown="editFormKeydown(event, \'' + escAttr(e.key) + '\')">';
  html += '<div class="edit-form-header">';
  html += '<span class="badge badge-' + dd.type + '">' + typeLabel(dd.type) + '</span>';
  if (e.isAdminAdded) html += '<span class="badge badge-added">Added</span>';
  html += '<span style="color:#94a3b8;font-size:0.82rem;">Edit Event</span>';
  html += '</div>';

  html += '<div class="edit-form-grid">';
  html += '<div class="edit-form-field"><label>Name</label>';
  html += '<input type="text" id="edit-name" value="' + escAttr(dd.name) + '"></div>';
  html += '<div class="edit-form-field"><label>Duration</label>';
  html += '<input type="text" id="edit-duration" value="' + escAttr(dd.duration) + '" placeholder="e.g. 2 hrs, 45 min"></div>';

  html += '<div class="edit-form-field full-width"><div class="edit-form-checks">';
  html += '<label><input type="checkbox" id="edit-isHike"' + (dd.isHike ? ' checked' : '') + ' onchange="toggleHikeField(\'edit\')"> Is Hike</label>';
  html += '<label><input type="checkbox" id="edit-isWaterfall"' + (dd.isWaterfall ? ' checked' : '') + '> Is Waterfall</label>';
  html += '</div></div>';

  html += '<div class="edit-form-field" id="edit-hikeKm-field" style="' + (dd.isHike ? '' : 'display:none;') + '">';
  html += '<label>Hike Distance (km)</label>';
  html += '<input type="number" id="edit-hikeKm" step="0.1" min="0" value="' + (dd.hikeKm != null ? dd.hikeKm : '') + '">';
  html += '</div>';

  html += '</div>';

  html += '<div class="edit-form-actions">';
  html += '<button class="btn-save" onclick="saveFullEdit(\'' + escAttr(e.key) + '\')">Save</button>';
  html += '<button class="btn-cancel" onclick="cancelEdit()">Cancel</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function renderAddForm(dayId) {
  var html = '<div class="edit-form" onkeydown="addFormKeydown(event, ' + dayId + ')">';
  html += '<div class="edit-form-header">';
  html += '<span class="badge badge-added">New</span>';
  html += '<span style="color:#94a3b8;font-size:0.82rem;">Add Activity</span>';
  html += '</div>';

  html += '<div class="edit-form-grid">';
  html += '<div class="edit-form-field"><label>Name</label>';
  html += '<input type="text" id="add-name" placeholder="Activity name"></div>';
  html += '<div class="edit-form-field"><label>Duration</label>';
  html += '<input type="text" id="add-duration" placeholder="e.g. 2 hrs, 45 min"></div>';

  html += '<div class="edit-form-field full-width"><div class="edit-form-checks">';
  html += '<label><input type="checkbox" id="add-isHike" onchange="toggleHikeField(\'add\')"> Is Hike</label>';
  html += '<label><input type="checkbox" id="add-isWaterfall"> Is Waterfall</label>';
  html += '</div></div>';

  html += '<div class="edit-form-field" id="add-hikeKm-field" style="display:none;">';
  html += '<label>Hike Distance (km)</label>';
  html += '<input type="number" id="add-hikeKm" step="0.1" min="0">';
  html += '</div>';

  html += '</div>';

  html += '<div class="edit-form-actions">';
  html += '<button class="btn-save" onclick="saveAddition(' + dayId + ')">Add</button>';
  html += '<button class="btn-cancel" onclick="cancelAdd()">Cancel</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function toggleDay(dayId) {
  openDays[dayId] = openDays[dayId] === false;
  render();
}

function startEdit(key) {
  editingKey = key;
  addingToDay = null;
  render();
}

function cancelEdit() {
  editingKey = null;
  render();
}

function startAdd(dayId) {
  addingToDay = dayId;
  editingKey = null;
  render();
}

function cancelAdd() {
  addingToDay = null;
  render();
}

function toggleHikeField(prefix) {
  var cb = document.getElementById(prefix + '-isHike');
  var field = document.getElementById(prefix + '-hikeKm-field');
  if (field) field.style.display = cb && cb.checked ? '' : 'none';
}

function editFormKeydown(event, key) {
  if (event.key === 'Enter' && event.target.type !== 'checkbox') {
    event.preventDefault();
    saveFullEdit(key);
  }
  if (event.key === 'Escape') cancelEdit();
}

function addFormKeydown(event, dayId) {
  if (event.key === 'Enter' && event.target.type !== 'checkbox') {
    event.preventDefault();
    saveAddition(dayId);
  }
  if (event.key === 'Escape') cancelAdd();
}

async function saveFullEdit(key) {
  var nameEl = document.getElementById('edit-name');
  var durationEl = document.getElementById('edit-duration');
  var isHikeEl = document.getElementById('edit-isHike');
  var isWaterfallEl = document.getElementById('edit-isWaterfall');
  var hikeKmEl = document.getElementById('edit-hikeKm');

  var nameVal = nameEl ? nameEl.value.trim() : '';
  var durationVal = durationEl ? durationEl.value.trim() : '';
  var isHikeVal = isHikeEl ? isHikeEl.checked : false;
  var isWaterfallVal = isWaterfallEl ? isWaterfallEl.checked : false;
  var hikeKmVal = hikeKmEl ? hikeKmEl.value : '';

  if (!nameVal) { showToast('Name is required', true); return; }

  // Check if this is an admin-added activity
  var addIdx = -1;
  for (var i = 0; i < adminData.additions.length; i++) {
    if (adminData.additions[i].id === key) { addIdx = i; break; }
  }

  if (addIdx !== -1) {
    // Update the addition directly
    adminData.additions[addIdx].name = nameVal;
    adminData.additions[addIdx].duration = durationVal || null;
    adminData.additions[addIdx].isHike = isHikeVal;
    adminData.additions[addIdx].isWaterfall = isWaterfallVal;
    adminData.additions[addIdx].hikeDistanceKm = isHikeVal && hikeKmVal ? parseFloat(hikeKmVal) : null;
    editingKey = null;
    render();
    await saveAdminData();
    showToast('Updated');
    return;
  }

  // Base or custom event: compute diff against original
  var events = getAllEvents();
  var baseEvent = null;
  for (var j = 0; j < events.length; j++) {
    if (events[j].key === key) { baseEvent = events[j]; break; }
  }
  if (!baseEvent) { cancelEdit(); return; }

  var override = {};
  if (nameVal !== baseEvent.name) override.name = nameVal;
  if (durationVal !== (baseEvent.duration || '')) override.duration = durationVal;
  if (isHikeVal !== !!baseEvent.isHike) override.isHike = isHikeVal;
  if (isWaterfallVal !== !!baseEvent.isWaterfall) override.isWaterfall = isWaterfallVal;

  var km = isHikeVal && hikeKmVal ? parseFloat(hikeKmVal) : null;
  var baseKm = baseEvent.hikeKm != null ? baseEvent.hikeKm : null;
  if (km !== baseKm) override.hikeDistanceKm = km;

  if (Object.keys(override).length > 0) {
    adminData.overrides[key] = override;
  } else {
    delete adminData.overrides[key];
  }

  // Backward compat: sync name to renames
  if (override.name) {
    adminData.renames[key] = override.name;
  } else {
    delete adminData.renames[key];
  }

  editingKey = null;
  render();
  await saveAdminData();
  showToast('Updated');
}

async function saveAddition(dayId) {
  var nameEl = document.getElementById('add-name');
  var durationEl = document.getElementById('add-duration');
  var isHikeEl = document.getElementById('add-isHike');
  var isWaterfallEl = document.getElementById('add-isWaterfall');
  var hikeKmEl = document.getElementById('add-hikeKm');

  var nameVal = nameEl ? nameEl.value.trim() : '';
  var durationVal = durationEl ? durationEl.value.trim() : '';
  var isHikeVal = isHikeEl ? isHikeEl.checked : false;
  var isWaterfallVal = isWaterfallEl ? isWaterfallEl.checked : false;
  var hikeKmVal = hikeKmEl ? hikeKmEl.value : '';

  if (!nameVal) { showToast('Name is required', true); return; }

  var addition = {
    id: generateId(),
    dayId: dayId,
    name: nameVal,
    duration: durationVal || null,
    isHike: isHikeVal,
    isWaterfall: isWaterfallVal,
    hikeDistanceKm: isHikeVal && hikeKmVal ? parseFloat(hikeKmVal) : null,
    addedAt: new Date().toISOString()
  };

  adminData.additions.push(addition);
  addingToDay = null;
  render();
  await saveAdminData();
  showToast('Activity added');
}

async function hideEvent(key) {
  var events = getAllEvents();
  var ev = null;
  for (var i = 0; i < events.length; i++) {
    if (events[i].key === key) { ev = events[i]; break; }
  }

  // Admin-added events: remove from additions entirely
  if (ev && ev.isAdminAdded) {
    adminData.additions = adminData.additions.filter(function(a) { return a.id !== key; });
    delete adminData.overrides[key];
    render();
    await saveAdminData();
    showToast('Removed added activity');
    return;
  }

  // Custom events: persist deletion to admin-deleted-events.json
  if (ev && ev.isCustom) {
    if (adminDeletedEvents.indexOf(key) === -1) {
      adminDeletedEvents.push(key);
    }
    try {
      var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(adminDeletedEvents, null, 2))));
      var body = { message: 'Admin: delete custom event ' + key.substring(0, 8), content: encoded, branch: 'main' };
      if (adminDeletedSha) body.sha = adminDeletedSha;
      var res = await fetch(API + '/contents/data/admin-deleted-events.json', {
        method: 'PUT',
        headers: Object.assign({ 'Content-Type': 'application/json' }, headers()),
        body: JSON.stringify(body)
      });
      var json = await res.json();
      if (json.content) adminDeletedSha = json.content.sha;
    } catch (e) { console.error('Error saving admin-deleted-events', e); }
    render();
    showToast('Deleted — will be removed from all apps on next sync');
    return;
  }

  // Base events: add to hidden list
  if (adminData.hidden.indexOf(key) === -1) {
    adminData.hidden.push(key);
  }
  render();
  await saveAdminData();
  showToast('Removed — use Hidden Events to restore');
}

async function restoreEvent(key) {
  adminData.hidden = adminData.hidden.filter(function(k) { return k !== key; });
  render();
  await saveAdminData();
  showToast('Restored');
}

async function saveAdminData() {
  if (saving) return;
  saving = true;
  try {
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(adminData, null, 2))));
    var body = { message: 'Admin: update schedule overrides', content: encoded, branch: 'main' };
    if (adminSha) body.sha = adminSha;
    var res = await fetch(API + '/contents/data/schedule-admin.json', {
      method: 'PUT',
      headers: Object.assign({ 'Content-Type': 'application/json' }, headers()),
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      showToast('Save failed — try again', true);
      return;
    }
    var json = await res.json();
    if (json.content) adminSha = json.content.sha;
  } catch (e) {
    showToast('Save error: ' + e.message, true);
  } finally {
    saving = false;
  }
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (isError ? 'error' : 'success');
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3000);
}

load();
</script>
